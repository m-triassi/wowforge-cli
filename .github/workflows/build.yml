name: Generate release-artifacts

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'flake.nix'
      - 'default.nix'
      - 'flake.lock'
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  generate:
    name: Generate cross-platform builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set-up Golang
        uses: actions/setup-go@v4
        with:
          go-version: "^1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Generate changelog and tag release
        id: changelog
        uses: TriPSs/conventional-changelog-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: CHANGELOG.md
          input-file: CHANGELOG.md
          fallback-version: 0.0.0
          skip-version-file: true
          skip-commit: true
          git-push: false
          skip-tag: true

      - name: Write changelog to temp file for goreleaser
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: echo "${{ steps.changelog.outputs.clean_changelog }}" > ${{ runner.temp }}/CHANGELOG.md

      - name: Update version number for flag
        run: |
          sed -i 's/const version = \"v[0-9\.]*\"/const version = \"${{ steps.changelog.outputs.tag }}\"/' cmd/root.go

      - name: Update nix version and vendorHash
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          VERSION="${{ steps.changelog.outputs.tag }}"
          VERSION="${VERSION#v}"

          # Bump the version in both nix files
          sed -i "s/version = \"[0-9][0-9.]*\";/version = \"${VERSION}\";/" flake.nix default.nix

          # Set a fake vendorHash so the build reports the correct one
          FAKE="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          sed -i "s|vendorHash = \"sha256-[^\"]*\";|vendorHash = \"${FAKE}\";|" flake.nix default.nix

          # Build to capture the real hash from the mismatch error
          REAL_HASH=$(nix build .#wowforge-cli 2>&1 | grep -oE 'got: *sha256-[A-Za-z0-9+/=]+' | grep -oE 'sha256-[A-Za-z0-9+/=]+')
          if [ -z "$REAL_HASH" ]; then
            echo "Failed to determine vendorHash" >&2
            exit 1
          fi
          echo "Resolved vendorHash: ${REAL_HASH}"

          # Write the real hash into both files
          sed -i "s|vendorHash = \"sha256-[^\"]*\";|vendorHash = \"${REAL_HASH}\";|" flake.nix default.nix

          # Verify the build now succeeds
          nix build .#wowforge-cli

      - name: Commit release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          git config user.name "Massimo Triassi"
          git config user.email "m-triassi@users.noreply.github.com"
          git add .
          git commit -m "chore(release): ${{ steps.changelog.outputs.tag }}"

      - name: Tag commit
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: git tag ${{ steps.changelog.outputs.tag }}

      - name: Push changelog
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          git push origin main

      - name: Release new CLI version
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: goreleaser/goreleaser-action@v4
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASER_TOKEN }}
